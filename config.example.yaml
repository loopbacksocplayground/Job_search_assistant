# ── Job Search Assistant — config.example.yaml ────────────────────────────────
# Copy this file to config.yaml, fill in your details, and commit it to your fork.
# Secrets (API keys, passwords) stay in GitHub Secrets — not here.

# ── Your profile ───────────────────────────────────────────────────────────────
profile:
  email: "you@example.com"        # used as the User-Agent header for the USAJobs API

# ── What to search for ─────────────────────────────────────────────────────────
# Each entry becomes one search request. Add as many as you like.
# Location can be "remote", a city, a state, or a metro area.
searches:
  - query: "senior marketing manager"
    location: "remote"
  - query: "physical therapist"
    location: "Chicago, IL"
  - query: "data analyst"
    location: "New York, NY"

# ── Job sources ────────────────────────────────────────────────────────────────
sources:
  indeed: true
  linkedin: true
  usajobs: false                  # US federal jobs only; requires USAJOBS_API_KEY secret
  country: "USA"                  # country for Indeed searches (e.g. USA, UK, Canada, Australia)
  results_per_query: 25           # listings fetched per search (max ~50 before rate limits)
  days_old: 14                    # only include jobs posted within this many days

# ── Location filtering ─────────────────────────────────────────────────────────
# A job passes the filter if:
#   (a) always_include_remote is true AND "remote" appears in the job's location, OR
#   (b) the job's location contains any string from the include list
#
# A job is dropped if its location matches any string in the exclude list.
# Exclusions take priority over inclusions. Matching is case-insensitive substring.
#
# Tip: leave include empty to accept all non-excluded locations.
location:
  always_include_remote: true
  include:
    - "Chicago"
    - "New York"
  exclude:
    - "United Kingdom"
    - "Canada"
    - "Australia"
    - "India"
    - "Germany"
    - "France"
    - "Italy"
    - "Spain"
    - "Brazil"
    - "Saudi Arabia"
    - "Philippines"
    # Add any location you want to block

# ── Scoring ────────────────────────────────────────────────────────────────────
# The scanner sends each job's title, company, location, and description to Claude
# along with your prompt, then gets back a tier (A/B/C), score (1-10), and reason.
#
# Without ANTHROPIC_API_KEY, scoring falls back to free keyword matching using
# boost_keywords below.
scoring:
  model: "claude-haiku-4-5"       # cheapest capable Claude model (~$0.02-0.05/run for ~100 jobs)

  # Write this as if you're briefing a recruiter: who you are, what you want,
  # what makes a listing worth applying to, and what makes you skip it.
  # The more specific you are, the better the scoring.
  prompt: |
    You are evaluating job listings for an experienced marketing manager with
    10 years in B2B SaaS, specializing in demand generation and content strategy.

    Score highly for:
    - Director or VP-level roles with strategic ownership
    - Companies with strong inbound or product-led growth motions
    - Remote-first or hybrid roles in the United States

    Score lower for:
    - Coordinator or specialist roles (too junior)
    - Pure brand or events roles with no demand generation component
    - Agency or consulting positions

  tier_a_min_score: 8             # score >= this → Tier A (apply this week)
  tier_b_min_score: 6             # score >= this → Tier B (apply next week)
                                  # below tier_b_min_score → Tier C (backup)

  # Free keyword fallback — used when ANTHROPIC_API_KEY is not set.
  # Each keyword found in the job title or description adds 0.5 to a base score of 5.
  boost_keywords:
    - "senior"
    - "lead"
    - "director"
    - "manager"
    - "remote"
    - "hybrid"

# ── Resumes ────────────────────────────────────────────────────────────────────
# File paths shown in output so you know which resume to send.
# With one entry it is always used. With multiple, Claude will recommend one —
# reference the variants in your scoring prompt so it knows what each is for.
resumes:
  default: "resume.pdf"
  # Example with multiple variants:
  # general:  "resume_general.pdf"
  # senior:   "resume_senior.pdf"
  # contract: "resume_contract.pdf"
